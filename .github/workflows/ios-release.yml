name: iOS

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Build (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qr ebapokun-unsigned.ipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebapokun-ipa
          path: build/ios/iphoneos/ebapokun-unsigned.ipa

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/iphoneos/ebapokun-unsigned.ipa
